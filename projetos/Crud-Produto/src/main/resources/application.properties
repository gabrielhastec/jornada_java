# =========================================================
# CONFIGURAÇÃO DO BANCO DE DADOS
# =========================================================

# URL de conexão com PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/jornada_java
# Usuário do banco
spring.datasource.username=postgres
# Senha do banco
spring.datasource.password=123456
# Driver JDBC do PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================================
# CONFIGURAÇÃO JPA / HIBERNATE
# =========================================================

# Define estratégia de atualização do banco
#
# update  -> atualiza tabelas automaticamente
# create  -> recria o banco toda vez
# create-drop -> cria ao iniciar e apaga ao encerrar
# validate -> apenas valida estrutura
#
# Para estudos: update
spring.jpa.hibernate.ddl-auto=update
# Exibe SQL no console
spring.jpa.show-sql=true
# Formata SQL exibido no console
spring.jpa.properties.hibernate.format_sql=true

# =========================================================
# CONFIGURAÇÃO DE LOG SQL
# =========================================================

# Mostra queries SQL executadas
logging.level.org.hibernate.SQL=DEBUG
# Mostra parâmetros enviados nas queries
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# =========================================================
# CONFIGURAÇÃO DO SERVIDOR
# =========================================================

# Porta da aplicação
server.port=8080

# =========================================================
# CONFIGURAÇÃO DE ENCODING
# =========================================================

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
